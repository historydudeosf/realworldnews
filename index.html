<!DOCTYPE html>
<html>
<head>
<title>Site Administration</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  margin: 40px;
}

h1 {
  color: #333;
}

.admin-box {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 6px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.role {
  font-weight: bold;
  color: #555;
}
</style>
</head>

<body>

<h1>Website Administration</h1>
<p>The following individuals manage this website.</p>

<div class="admin-box">
  <div class="role">Site Owner</div>
  Mittchell Carson
</div>

<div class="admin-box">
  <div class="role">Editor</div>
  Josh
</div>

<div class="admin-box">
  <div class="role">Moderator</div>
  Name
</div>

</body>
</html>
