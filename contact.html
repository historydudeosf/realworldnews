<section class="container mx-auto py-16 px-6 max-w-lg">
  <h2 class="text-3xl font-bold text-blue-700 mb-6 text-center">Contact Us</h2>
  <form class="bg-white shadow rounded p-6 space-y-4">
    <input type="text" placeholder="Name" class="w-full border px-3 py-2 rounded">
    <input type="email" placeholder="Email" class="w-full border px-3 py-2 rounded">
    <textarea placeholder="Message" class="w-full border px-3 py-2 rounded"></textarea>
    <button class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-500 transition">Send</button>
  </form>
</section>
